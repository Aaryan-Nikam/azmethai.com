<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azmeth Browser Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 200px;
      background: #0a0a0b;
      color: #f0f0f2;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #222228;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: rgba(74, 222, 128, 0.08);
      border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { color: #4ade80; }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f0f0f2;
      letter-spacing: -0.02em;
    }

    .header-text p {
      font-size: 11px;
      color: #6b6b80;
      margin-top: 2px;
    }

    .status-card {
      margin: 16px;
      padding: 14px 16px;
      background: #111114;
      border: 1px solid #222228;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .status-dot.connected {
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.disconnected {
      background: #3a3a48;
    }

    .status-text {
      flex: 1;
    }

    .status-label {
      font-size: 12px;
      font-weight: 500;
      color: #f0f0f2;
    }

    .status-sub {
      font-size: 10px;
      color: #6b6b80;
      margin-top: 2px;
    }

    .status-sub.connected { color: #4ade80; }

    .info-section {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #111114;
      border: 1px solid #222228;
      border-radius: 6px;
    }

    .info-key {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #3a3a48;
    }

    .info-val {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: #6b6b80;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #111114;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-note {
      font-size: 10px;
      color: #3a3a48;
    }

    .engine-url {
      font-size: 10px;
      font-family: monospace;
      color: #3a3a48;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Azmeth Browser Agent</h1>
      <p>Autonomous AI Extension</p>
    </div>
  </div>

  <div class="status-card">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text">
      <div class="status-label" id="status-label">Checking connection...</div>
      <div class="status-sub" id="status-sub">ws://localhost:4002/browser</div>
    </div>
  </div>

  <div class="info-section">
    <div class="info-row">
      <span class="info-key">Engine</span>
      <span class="info-val">localhost:4002</span>
    </div>
    <div class="info-row">
      <span class="info-key">Version</span>
      <span class="info-val">1.0.0</span>
    </div>
    <div class="info-row">
      <span class="info-key">Mode</span>
      <span class="info-val">Stealth</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-note">Connected to Azmeth AI Engine</span>
    <span class="engine-url">/browser</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
