services:
  - type: web
    name: azmeth-frontend
    runtime: node
    plan: starter # Starter plan prevents sleep cycles for Meta webhooks
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: NEXT_PUBLIC_META_REDIRECT_URI
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_SENDER_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: OUTBOUND_DAILY_LIMIT
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false

  - type: cron
    name: azmeth-queue-worker
    runtime: node
    schedule: "*/1 * * * *"
    rootDir: frontend
    buildCommand: npm install
    startCommand: >
      node -e "fetch(process.env.NEXT_PUBLIC_APP_URL + '/api/cron/process-queue',{headers:{Authorization:'Bearer '+process.env.CRON_SECRET}})
      .then(async (r)=>{const body=await r.text();console.log('status='+r.status);console.log(body);process.exit(r.ok?0:1);})
      .catch((e)=>{console.error(e);process.exit(1);})"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false
